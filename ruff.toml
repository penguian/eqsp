line-length = 88

[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
]

[lint.per-file-ignores]
# thesis-examples require strictly ordered initialization of matplotlib.use("Agg")
# and sys.path manipulation, which triggers I001 and E402.
"examples/phd-thesis/src/*.py" = ["I001", "E402"]

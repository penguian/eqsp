name: pre-commit

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Run Ruff
      run: ruff check eqsp tests examples/phd-thesis benchmarks verify_all.py
    - name: Run Pylint
      run: |
        export PYTHONPATH=$PYTHONPATH:.:benchmarks/src
        python -m pylint eqsp tests examples/phd-thesis benchmarks verify_all.py
    - name: Run Tests
      run: python3 verify_all.py

name: pre-commit

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pylint
        pip install -e .
    - name: Run Ruff
      run: ruff check benchmarks eqsp tests thesis-examples
    - name: Run Pylint
      run: pylint benchmarks eqsp tests thesis-examples

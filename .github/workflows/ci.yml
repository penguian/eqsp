name: CI

on:
  push:
    branches: [ main, release_* ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    name: Test (Python ${{ matrix.python-version }})
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,docs]"
    - name: Run Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.:benchmarks/src
        python3 validation/verify_all.py

  build-dist:
    runs-on: ubuntu-latest
    name: Verify Distribution Build
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    - name: Build distribution
      run: python -m build
    - name: Check distribution
      run: twine check dist/*
    - name: Verify clean install from wheel
      run: |
        python -m venv test_env
        source test_env/bin/activate
        pip install dist/*.whl
        python -c "import eqsp; print(eqsp.__version__)"
